联汽车保险纠纷成北京金融法院关注焦点，智驾保险体系建设提速"},{"title":"GB 47955—2026《智能网联汽车 组合驾驶辅助系统安全要求》强制性国家标准正式发布","source":"人民日报 / 中国经济网","source_type":"media","url":"https://www.ce.cn/xwzx/gnsz/gdxw/202607/t20260713_3083409.shtml","publish_date":"2026-07-12","window":"2026-07-12","category":"标准动态","summary":"本报北京7月12日电，工业和信息化部组织制定并归口的《智能网联汽车 组合驾驶辅助系统安全要求》（GB 47955—2026）强制性国家标准，近日由国家市场监督管理总局、国家标准化管理委员会批准发布，拟于2027年1月1日起正式实施。该标准是首部专门针对L2级组合驾驶辅助系统的强制性安全技术规范，充分考虑不同产品形态和技术路线，针对基础单车道、基础多车道、领航驾驶辅助（NOA）三类产品分别提出适用安全要求。标准从功能要求、数据记录、车辆制造商安全保障等维度提出基线要求，并构建了包括场地试验、道路试验、文件检验等在内的多层级评价方法。","importance":5,"overview":"GB 47955—2026《智能网联汽车 组合驾驶辅助系统安全要求》强制性国家标准正式发布"},{"title":"特斯拉FSD v14 Lite首次走出美国，韩国成为全球首个获得更新的海外市场","source":"IT之家","source_type":"media","url":"https://view.inews.qq.com/a/20260712A039TS00","publish_date":"2026-07-12","window":"2026-07-12","category":"技术动态","summary":"7月12日，特斯拉韩国官方宣布，FSD v14 Lite已开始在美国以外市场首次推送，韩国成为全球首个获得该更新的海外市场。老款Model 3/Y及搭载HW3.0芯片的车辆已收到固件推送，支持更强的自动驾驶功能。此次更新标志着特斯拉FSD首次走出美国进行海外部署，对全球自动驾驶技术竞争格局具有标志性意义。此前特斯拉CEO马斯克曾表示将在全球多个市场推进FSD落地，韩国成为首批受益市场，为后续在中国、欧洲等市场的部署积累经验。","importance":3,"overview":"特斯拉FSD v14 Lite首次走出美国，韩国成为全球首个获得更新的海外市场"},{"title":"高阶智驾加速下沉至大众市场，零跑已将城市NOA落地至8万元级车型","source":"中国新闻网","source_type":"media","url":"https://view.inews.qq.com/a/20260712A05JRL00","publish_date":"2026-07-12","window":"2026-07-12","category":"技术动态","summary":"7月12日，第23届长春国际汽车博览会上，蔚来、极狐、零跑、深蓝、比亚迪等多个中国自主品牌将智能驾驶作为核心参展卖点。其中零跑已把高阶智能驾驶落地至8万元级车型，多款入门车型开始搭载城市NOA功能。国产激光雷达和车载芯片规模化量产使硬件成本持续走低，智驾系统成本已降至3000-5000元级别，行业竞争正从价格战转向智驾普及能力的比拼。高阶智驾从高端车型向大众市场下沉的趋势，有望在2027年推动L2+级智能驾驶渗透率进一步攀升至更高水平。","importance":4,"overview":"高阶智驾加速下沉至大众市场，零跑已将城市NOA落地至8万元级车型"},{"title":"小鹏Robotaxi正式开启员工内测，何小鹏完成首单并兼任机器人业务负责人","source":"21世纪经济报道","source_type":"media","url":"https://view.inews.qq.com/a/20260712A04M4K00","publish_date":"2026-07-12","window":"2026-07-12","category":"项目动态","summary":"7月12日消息，小鹏Robotaxi正式开启员工内测，何小鹏化身「一号乘客」完成首单。该项目以GX为原型车，基于纯视觉方案打造，搭载4颗自研图灵AI芯片（总算力3000TOPS），采用与量产车同源的图灵智驾VLA 2.0大模型，是首款全栈自研前装量产的纯视觉L4级Robotaxi。从2025年11月官宣到全链路跑通仅用8个月。与此同时，何小鹏已亲自挂帅兼任小鹏机器人业务负责人，明确将冲刺IRON人形机器人量产，推动物理AI新赛道布局，Robotaxi被视为从「新能源汽车」迈向「机器人汽车」战略的核心载体。","importance":4,"overview":"小鹏Robotaxi正式开启员工内测，何小鹏完成首单并兼任机器人业务负责人"},{"title":"特斯拉Cybercab即将在得州超级工厂向员工开放试乘体验","source":"IT之家 / 网易","source_type":"media","url":"https://www.163.com/dy/article/L1KDFB3N0511B8LM.html","publish_date":"2026-07-12","window":"2026-07-12","category":"项目动态","summary":"7月12日，特斯拉官方账号宣布Cybercab将「很快在得州超级工厂向员工开放试乘体验」。特斯拉发布视频展示一辆金色Cybercab打开蝶翼门，在没有方向盘和踏板的情况下自动行驶。这是特斯拉首次公开表示将让人员乘坐这款无方向盘、无踏板的无人驾驶出租车，累计获得约290万次浏览。目前存在两种可能：一是在园区内部道路提供真正可预约的接驳服务，二是仅在停车场内短距离演示。业界更关注Cybercab何时能加入特斯拉在奥斯汀运营的收费Robotaxi车队。","importance":3,"overview":"特斯拉Cybercab即将在得州超级工厂向员工开放试乘体验"},{"title":"2026京津冀新能源和智能网联汽车产业链对接活动在廊坊举办，15家企业达成合作意向","source":"河北新闻网 / 网易","source_type":"media","url":"https://hebei.news.163.com/26/0712/10/L1KN5INQ04159CNM.html","publish_date":"2026-07-12","window":"2026-07-12","category":"项目动态","summary":"7月12日报道，由河北省工信厅会同北京市经信局、天津工信局联合主办的2026京津冀新能源和智能网联汽车产业链对接活动在廊坊举办。北汽股份、天津远程、长城汽车、吉利汽车、小米汽车、上汽尚界等12家整车企业及90余家零部件企业参加对接会。三地专家和车企负责人共同探讨行业发展方向与趋势，现场共有15家企业达成初步合作意向。活动旨在纵深打通三地汽车产业融合通道，促进整车与零部件企业精准对接，打造互补配套、高效联动的区域汽车产业生态圈。","importance":3,"overview":"2026京津冀新能源和智能网联汽车产业链对接活动在廊坊举办，15家企业达成合作意向"},{"title":"工信部：2026上半年国内乘用车L2级自动驾驶搭载率达70%，NOA车型占比超30%","source":"工信部 / 腾讯新闻","source_type":"gov","url":"https://www.miit.gov.cn/xwfb/gxdt/sjdt/art/2026/art_e28beb9f8fe94a92ba0a3a67c39eea20.html","publish_date":"2026-07-12","window":"2026-07-12","category":"行业动态","summary":"7月12日，工信部公布数据显示，2026年上半年国内乘用车新车中70%搭载了L2级自动驾驶功能，其中配备领航驾驶辅助（NOA，含城区和高速）的车型占比超过30%。华为乾崑智驾搭载量已突破190万辆，Momenta智驾系统搭载规模突破100万辆。高速NOA和城区NOA正在加速从高端车型向主流市场渗透，L2级智能驾驶已成为新车的标准配置。端到端大模型、无图智驾等技术路线日趋成熟，推动中国智能网联汽车产业进入规模化普及新阶段。","importance":3,"overview":"工信部：2026上半年国内乘用车L2级自动驾驶搭载率达70%，NOA车型占比超30%"},{"title":"特斯拉46天拆除Model S/X生产线，改造为Optimus人形机器人生产基地","source":"红星新闻","source_type":"media","url":"https://view.inews.qq.com/a/20260712A06DB600","publish_date":"2026-07-12","window":"2026-07-12","category":"行业动态","summ 人驾驶汽车上路，利好Robotaxi产业发展"},{"title":"我国首个L2级组合驾驶辅助强制国标GB 47955—2026正式发布深度解读","source":"盖世汽车","source_type":"media","url":"#no-url-7","publish_date":"2026-07-09","window":"2026-07-09","category":"标准动态","summary":"盖世汽车发布GB 47955—2026《智能网联汽车 组合驾驶辅助系统安全要求》深度解读。该标准是首部专门针对L2级组合驾驶辅助系统的强制性安全技术规范，将L2级系统明确划分为基础单车道、基础多车道、领航驾驶辅助（NOA）三类，分别提出安全要求，从根源上杜绝了车企以「L2.5」「L2.9」等非标准话术进行模糊宣传的空间。标准构建了包括场地试验、道路试验、文件检验等在内的多层级评价体系。","importance":5,"overview":"我国首个L2级组合驾驶辅助强制国标GB 47955—2026正式发布深度解读"},{"title":"灵境智源完成超亿元天使轮及天使+轮融资，经纬创投领投，专注具身智能计算底座","source":"盖世汽车","source_type":"media","url":"#no-url-8","publish_date":"2026-07-09","window":"2026-07-09","category":"投融资动态","summary":"盖世汽车获悉，灵境智源已于近日完成超亿元天使轮及天使+轮融资，由经纬创投领投，上海闵行国资跟投。灵境智源定位具身原生全栈计算底座服务商，聚焦具身智能底层Infra赛道，为具身智能原生打造了德沃夏克超异构计算架构。目前已推出N系列与T系列双产品路径，全面适配人形、轮式、四足等全品类机器人形态，已对接超过300家机器人本体及泛具身企业。","importance":5,"overview":"灵境智源完成超亿元天使轮及天使+轮融资，经纬创投领投，专注具身智能计算底座"},{"title":"华为高管李文广：特别欢迎特斯拉FSD入华，确认明年技术上实现高速L3自动驾驶","source":"快科技 / 新浪科技","source_type":"media","url":"#no-url-9","publish_date":"2026-07-09","window":"2026-07-09","category":"技术动态","summary":"华为智能驾驶解决方案产品线总裁李文广接受采访明确表示：华为特别欢迎特斯拉FSD正式入华同台竞技，从技术落地节奏看，明年国内高速场景将正式迈入大规模商用的L3自动驾驶时代。今年下半年多款高端新能源车型将提前为高速L3功能做足硬件预埋。华为今年自动驾驶研发投入约100多亿，明年将超200亿。","importance":5,"overview":"华为高管李文广：特别欢迎特斯拉FSD入华，确认明年技术上实现高速L3自动驾驶"},{"title":"速腾聚创上半年激光雷达交付71.92万台，ADAS领域增长98%，机器人业务大增510%","source":"盖世汽车","source_type":"media","url":"#no-url-10","publish_date":"2026-07-09","window":"2026-07-09","category":"技术动态","summary":"速腾聚创上半年激光雷达产品总销量达719,200台，同比增长170%。其中ADAS领域销量436,600台，同比增长98%；机器人领域销量282,600台，同比增长510%。公司已与超过3400家机器人公司达成合作，连续多季度位居全球机器人3D激光雷达出货量第一。基于凤凰芯片的400万像素高清激光雷达方案已获头部车企定点，预期年内量产上车。","importance":4,"overview":"速腾聚创上半年激光雷达交付71.92万台，ADAS领域增长98%，机器人业务大增510%"},{"title":"小鹏Robotaxi进入员工内测阶段，定位全球软硬件方案供应商角色","source":"盖世汽车","source_type":"media","url":"#no-url-11","publish_date":"2026-07-09","window":"2026-07-09","category":"项目动态","summary":"小鹏召开Robotaxi业务首次全员会议，宣布该业务正式进入员工内测阶段。Robotaxi将作为集团物理AI与「机器人汽车」战略的核心载体。小鹏规划重心不在自建 urce_type":"gov","url":"https://www.miit.gov.cn/jgsj/zbys/qcgy/art/2026/art_1ff554c909a142cdb56b188a9a9a7f2f.html","publish_date":"2026-07-09","window":"2026-07-09","category":"行业动态","summary":"工信部发布2026年6月汽车工业经济运行情况。6月汽车产销分别完成276万辆和281万辆，同比下降1.2%和3.2%。新能源汽车产销分别完成159.8万辆和164.3万辆，同比增长26%和23.6%，新车渗透率达58.5%。1-6月新能源汽车产销累计743.8万辆和744.6万辆，同比增长6.7%和7.3%，渗透率49.6%。6月汽车整车出口103.7万辆，同比增长75.1%，其中新能源汽车出口52.3万辆，同比增长1.6倍。","importance":4,"overview":"2026年6月汽车工业经济运行情况：新能源汽车产销增长超23%，渗透率近六成"}]},"2026-07-08":{"total":7,"categories":{"政策法规":1,"标准动态":1,"投融资动态":1,"技术动态":3,"项目动态":1},"articles":[{"title":"全国统一无人车上路标准正式实施，GA/T 2388-2026 重塑无人物流合规运营新秩序","source":"腾讯新闻","source_type":"media","url":"#no-url-1","publish_date":"2026-07-08","window":"2026-07-08","category":"政策法规","summary":"公安部发布的《智能网联汽车道路测试与示范应用安全通行规范》（GA/T 2388-2026）正式实施，成为国内首个统一覆盖 L3 及以上高阶自动驾驶车辆的道路通行安全准则。该标准适用城市道路、普通公路、开放示范区等场景，对近两年快速扩张的无人物流、无人末端配送、自动驾驶城配货运等行业形成全国统一的合规运营底线，标志着无人物流车行业告别野蛮生长、迈入规范化发展新阶段。","importance":3,"overview":"全国统一无人车上路标准正式实施，GA/T 2388-2026 重塑无人物流合规运营新秩序"},{"title":"中国首部 L3/L4 自动驾驶强制国标即将落地，2027 年 7 月实施倒计时","source":"搜狐汽车","source_type":"media","url":"#no-url-2","publish_date":"2026-07-08","window":"2026-07-08","category":"标准动态","summary":"工信部就《智能网联汽车 自动驾驶系统安全要求》强制国标（报批稿）公开征求意见，建议实施日期为 2027 年 7 月 1 日。该国标是首部针对 L3 有条件自动驾驶和 L4 高度自动驾驶的强制性国家标准，意味着所有宣称搭载 L3/L4 功能的新车须达标后方可申报公告、禁止上市销售，与已发布的组合驾驶辅助强制国标形成「L2+L3+L4」三段式强制标准体系，中国自动驾驶治理体系由此完成闭环。","importance":5,"overview":"中国首部 L3/L4 自动驾驶强制国标即将落地，2027 年 7 月实施倒计时"},{"title":"Momenta 正式登陆港交所，成为「物理 AI 第一股」，市值超 700 亿港元","source":"盖世汽车","source_type":"media","url":"#no-url-3","publish_date":"2026-07-08","window":"2026-07-08","category":"投融资动态","summary":"7 月 8 日，Momenta 以每股 295.6 港元发行价在港交所正式挂牌上市（股票代码 6880.HK），开盘涨超 6%，总市值超 700 亿港元。此次 IPO 引入 GIC、富达、比亚迪、奔驰等 14 家基石投资者，公开认购超 400 倍，机构抢筹超 1000 亿港元。Momenta 是全球城市 NOA 解决方案销量第一的独立智驾方案提供商，上市后被资本市场赋予「物理 AI 第一股」称号，标志着智能驾驶赛道资本化进入新阶段。","importance":5,"overview":"Momenta 正式登陆港交所，成为「物理 AI 第一股」，市值超 700 亿港元"},{"title":"东风汽车率先实现国内自主线控转向系统量产落地，首款车型通过工信 ","window":"2026-06-30","category":"技术动态","summary":"地平线全场景辅助驾驶系统HSD 2.0开始上车推送，主动安全不再依赖白名单。方案依托征程系列芯片与端到端感知决策能力，可识别警笛、鸣笛，雨雾/夜间稳定性显著提升，国产智驾方案在L2++市场加速渗透。","importance":3,"overview":"地平线全场景辅助驾驶HSD 2.0上车推送，主动安全不再依赖白名单"},{"title":"国家级创新中心布局：太空算力+智能网联汽车产业合作开启","source":"中国证券报","source_type":"media","url":"https://www.cs.com.cn/ssgs/01/2026/06/30/detail_2026063010021503.html","publish_date":"2026-06-30","window":"2026-06-30","category":"技术动态","summary":"国家级创新中心启动太空算力与智能网联汽车产业合作，瞄准通信-计算-感知跨界融合。太空算力为自动驾驶模型训练提供新的算力选项，缓解大模型上车算力压力，加速车端AI能力升级。","importance":3,"overview":"国家级创新中心布局：太空算力+智能网联汽车产业合作开启"},{"title":"Momenta启动港股招股，募资58.9亿港元，奔驰比亚迪认购","source":"21世纪经济报道","source_type":"media","url":"https://m.21jingji.com/article/20260629/herald/b098a6bfe1f03bedbac90876a18e4aad.html","publish_date":"2026-06-30","window":"2026-06-30","category":"投融资动态","summary":"自动驾驶技术企业Momenta 6月29日启动港股招股，计划7月8日上市，发行价295.6港元/股，全球发售1993.83万股，募资约58.9亿港元。14家基石投资者认购约3.76亿美元（占募资一半），含GIC、富达、奔驰、比亚迪等。","importance":4,"overview":"Momenta启动港股招股，募资58.9亿港元，奔驰比亚迪认购"}]}},"weekly":{"2026-07-06":{"week_start":"2026-07-06","week_end":"2026-07-12","total":57,"categories":{"政策法规":8,"标准动态":10,"技术动态":13,"项目动态":19,"行业动态":3,"投融资动态":4},"articles":[{"title":"智能网联汽车保险纠纷成北京金融法院关注焦点，智驾保险体系建设提速","source":"中国经营报 / 新浪财经","source_type":"media","url":"https://cj.sina.com.cn/articles/view/1650111241/625ab30902001gw3w","publish_date":"2026-07-12","window":"2026-07-12","category":"政策法规","summary":"7月12日报道，在第14个全国保险公众宣传日之际，北京金融法院发布一批涉科技保险案例，智能网联汽车保险成为重点关注和研究的新型险种。数据显示，2025年我国新能源汽车市场渗透率已突破50%，相关保险纠纷从传统交通事故理赔，转向自动驾驶系统故障、算法缺陷、数据安全等全新法律问题。今年3月，国家金融监管总局北京监管局已正式启动智能网联新能源汽车商业保险开发应用，新产品覆盖自动泊车、NOA领航辅助等功能事故风险及传感器、域控制器等关键部件损失。北京金融法院将通过与监管部门协同打造智能网联汽车保险创新「策源地」，为产业协同发展提供法治支撑。","importance":4,"overview":"智能网联汽车保险纠纷成北京金融法院关注焦点，智驾保险体系建设提速"},{"title":"GB 47955—2026《智能网联汽车 组合驾驶辅助系统安全要求》强制性国家标准正式发布","source":"人民日报 / 中国经济网","source_type":"media","url":"https://www.ce.cn/xwzx/gnsz/gdxw/202607/t20260713_3083409.shtml","publish_date":"2026-07-12","window":"2026-07-12","category":"标准动态","summary":"本报北京7月12日电，工业和信息化部组织制定并归口的《智能网联汽车 组合驾驶辅助系统安全要求》（GB 47955—2026）强制性国家标准，近日由国家市场监督管理总局、国家标准化管理委员会批准发布，拟于2027年1月1日起正式实施。该标准是首部专门针对L2级组合驾驶辅助系统的强制性安全技术规范，充分考虑不同产品形态和技术路线，针对基础单车道、基础多车道、领航驾驶辅助（NOA）三类产品分别提出适用安全要求。标准从功能要求、数据记录、车辆制造商安全保障等维度提出基线要求，并构建了包括场地试验、道路试验、文件检验等在内的多层级评价方法。","importance":5,"overview":"GB 47955—2026《智能网联汽车 组合驾驶辅助系统安全要求》强制性国家标准正式发布"},{"title":"特斯拉FSD v14 Lite首次走出美国，韩国成为全球首个获得更新的海外市场","source":"IT之家","source_type":"media","url":"https://view.inews.qq.com/a/20260712A039TS00","publish_date":"2026-07-12","window":"2026-07-12","category":"技术动态","summary":"7月12日，特斯拉韩国官方宣布，FSD v14 Lite已开始在美国以外市场首次推送，韩国成为全球首个获得该更新的海外市场。老款Model 3/Y及搭载HW3.0芯片的车辆已收到固件推送，支持更强的自动驾驶功能。此次更新标志着特斯拉FSD首次走出美国进行海外部署，对全球自动驾驶技术竞争格局具有标志性意义。此前特斯拉CEO马斯克曾表示将在全球多个市场推进FSD落地，韩国成为首批受益市场，为后续在中国、欧洲等市场的部署积累经验。","importance":3,"overview":"特斯拉FSD v14 Lite首次走出美国，韩国成为全球首个获得更新的海外市场"},{"title":"高阶智驾加速下沉至大众市场，零跑已将城市NOA落地至8万元级车型","source":"中国新闻网","source_type":"media","url":"https://view.inews.qq.com/a/20260712A05JRL00","publish_date":"2026-07-12","window":"2026-07-12","category":"技术动态","summary":"7月12日，第23届长春国际汽车博览会上，蔚来、极狐、零跑、深蓝、比亚迪等多个中国自主品牌将智能驾驶作为核心参展卖点。其中零跑已把高阶智能驾驶落地至8万元级车型，多款入门车型开始搭载城市NOA功能。国产激光雷达和车载芯片规模化量产使硬件成本持续走低，智驾系统成本已降至3000-5000元级别，行业竞争正从价格战转向智驾普及能力的比拼。高阶智驾从高端车型向大众市场下沉的趋势，有望在2027年推动L2+级智能驾驶渗透率进一步攀升至更高水平。","importance":4,"overview":"高阶智驾加速下沉至大众市场，零跑已将城市NOA落地至8万元级车型"},{"title":"小鹏Robotaxi正式开启员工内测，何小鹏完成首单并兼任机器人业务负责人","source":"21世纪经济报道","source_type":"media","url":"https://view.inews.qq.com/a/20260712A04M4K00","publish_date":"2026-07-12","window":"2026-07-12","category":"项目动态","summary":"7月12日消息，小鹏Robotaxi正式开启员工内测，何小鹏化身「一号乘客」完成首单。该项目以GX为原型车，基于纯视觉方案打造，搭载4颗自研图灵AI芯片（总算力3000TOPS），采用与量产车同源的图灵智驾VLA 2.0大模型，是首款全栈自研前装量产的纯视觉L4级Robotaxi。从2025年11月官宣到全链路跑通仅用8个月。与此同时，何小鹏已亲自挂帅兼任小鹏机器人业务负责人，明确将冲刺IRON人形机器人量产，推动物理AI新赛道布局，Robotaxi被视为从「新能源汽车」迈向「机器人汽车」战略的核心载体。","importance":4,"overview":"小鹏Robotaxi正式开启员工内测，何小鹏完成首单并兼任机器人业务负责人"},{"title":"特斯拉Cybercab即将在得州超级工厂向员工开放试乘体验","source":"IT之家 / 网易","source_type":"media","url":"https://www.163.com/dy/article/L1KDFB3N0511B8LM.html","publish_date":"2026-07-12","window":"2026-07-12","category":"项目动态","summary":"7月12日，特斯拉官方账号宣布Cybercab将「很快在得州超级工厂向员工开放试乘体验」。特斯拉发布视频展示一辆金色Cybercab打开蝶翼门，在没有方向盘和踏板的情况下自动行驶。这是特斯拉首次公开表示将让人员乘坐这款无方向盘、无踏板的无人驾驶出租车，累计获得约290万次浏览。目前存在两种可能：一是在园区内部道路提供真正可预约的接驳服务，二是仅在停车场内短距离演示。业界更关注Cybercab何时能加入特斯拉在奥斯汀运营的收费Robotaxi车队。","importance":3,"overview":"特斯拉Cybercab即将在得州超级工厂向员工开放试乘体验"},{"title":"2026京津冀新能源和智能网联汽车产业链对接活动在廊坊举办，15家企业达成合作意向","source":"河北新闻网 / 网易","source_type":"media","url":"https://hebei.news.163.com/26/0712/10/L1KN5INQ04159CNM.html","publish_date":"2026-07-12","window":"2026-07-12","category":"项目动态","summary":"7月12日报道，由河北省工信厅会同北京市经信局、天津工信局联合主办的2026京津冀新能源和智能网联汽车产业链对接活动在廊坊举办。北汽股份、天津远程、长城汽车、吉利汽车、小米汽车、上汽尚界等12家整车企业及90余家零部件企业参加对接会。三地专家和车企负责人共同探讨行业发展方向与趋势，现场共有15家企业达成初步合作意向。活动旨在纵深打通三地汽车产业融合通道，促进整车与零部件企业精准对接，打造互补配套、高效联动的区域汽车产业生态圈。","importance":3,"overview":"2026京津冀新能源和智能网联汽车产业链对接活动在廊坊举办，15家企业达成合作意向"},{"title":"工信部：2026上半年国内乘用车L2级自动驾驶搭载率达70%，NOA车型占比超30%","source":"工信部 / 腾讯新闻","source_type":"gov","url":"https://www.miit.gov.cn/xwfb/gxdt/sjdt/art/2026/art_e28beb9f8fe94a92ba0a3a67c39eea20.html","publish_date":"2026-07-12","window":"2026-07-12","category":"行业动态","summary":"7月12日，工信部公布数据显示，2026年上半年国内乘用车新车中70%搭载了L2级自动驾驶功能，其中配备领航驾驶辅助（NOA，含城区和高速）的车型占比超过30%。华为乾崑智驾搭载量已突破190万辆，Momenta智驾系统搭载规模突破100万辆。高速NOA和城区NOA正在加速从高端车型向主流市场渗透，L2级智能驾驶已成为新车的标准配置。端到端大模型、无图智驾等技术路线日趋成熟，推动中国智能网联汽车产业进入规模化普及新阶段。","importance":3,"overview":"工信部：2026上半年国内乘用车L2级自动驾驶搭载率达70%，NOA车型占比超30%"},{"title":"特斯拉46天拆除Model S/X生产线，改造为Optimus人形机器人生产基地","source":"红星新闻","source_type":"media","url":"https://view.inews.qq.com/a/20260712A06DB600","publish_date":"2026-07-12","window":"2026-07-12","category":"行业动态","summary":"7月12日，特斯拉发布视频展示弗里蒙特工厂Model S和Model X生产线拆除过程，仅耗时46天即完成。生产线原址将改造为Optimus人形机器人生产基地，目标年产能100万台，第三代Optimus预计7月底启动量产。此举标志着特斯拉战略重心从高端电动车型向人形机器人赛道加速转移。Model S和Model X是特斯拉最早推出的车型，其产线退役意味着特斯拉产品矩阵进入全面换代周期。人形机器人和Robotaxi正在成为特斯拉未来增长的双引擎。","importance":3,"o 算底座","source":"盖世汽车","source_type":"media","url":"#no-url-8","publish_date":"2026-07-09","window":"2026-07-09","category":"投融资动态","summary":"盖世汽车获悉，灵境智源已于近日完成超亿元天使轮及天使+轮融资，由经纬创投领投，上海闵行国资跟投。灵境智源定位具身原生全栈计算底座服务商，聚焦具身智能底层Infra赛道，为具身智能原生打造了德沃夏克超异构计算架构。目前已推出N系列与T系列双产品路径，全面适配人形、轮式、四足等全品类机器人形态，已对接超过300家机器人本体及泛具身企业。","importance":5,"overview":"灵境智源完成超亿元天使轮及天使+轮融资，经纬创投领投，专注具身智能计算底座"},{"title":"华为高管李文广：特别欢迎特斯拉FSD入华，确认明年技术上实现高速L3自动驾驶","source":"快科技 / 新浪科技","source_type":"media","url":"#no-url-9","publish_date":"2026-07-09","window":"2026-07-09","category":"技术动态","summary":"华为智能驾驶解决方案产品线总裁李文广接受采访明确表示：华为特别欢迎特斯拉FSD正式入华同台竞技，从技术落地节奏看，明年国内高速场景将正式迈入大规模商用的L3自动驾驶时代。今年下半年多款高端新能源车型将提前为高速L3功能做足硬件预埋。华为今年自动驾驶研发投入约100多亿，明年将超200亿。","importance":5,"overview":"华为高管李文广：特别欢迎特斯拉FSD入华，确认明年技术上实现高速L3自动驾驶"},{"title":"速腾聚创上半年激光雷达交付71.92万台，ADAS领域增长98%，机器人业务大增510%","source":"盖世汽车","source_type":"media","url":"#no-url-10","publish_date":"2026-07-09","window":"2026-07-09","category":"技术动态","summary":"速腾聚创上半年激光雷达产品总销量达719,200台，同比增长170%。其中ADAS领域销量436,600台，同比增长98%；机器人领域销量282,600台，同比增长510%。公司已与超过3400家机器人公司达成合作，连续多季度位居全球机器人3D激光雷达出货量第一。基于凤凰芯片的400万像素高清激光雷达方案已获头部车企定点，预期年内量产上车。","importance":4,"overview":"速腾聚创上半年激光雷达交付71.92万台，ADAS领域增长98%，机器人业务大增510%"},{"title":"小鹏Robotaxi进入员工内测阶段，定位全球软硬件方案供应商角色","source":"盖世汽车","source_type":"media","url":"#no-url-11","publish_date":"2026-07-09","window":"2026-07-09","category":"项目动态","summary":"小鹏召开Robotaxi业务首次全员会议，宣布该业务正式进入员工内测阶段。Robotaxi将作为集团物理AI与「机器人汽车」战略的核心载体。小鹏规划重心不在自建车队，而是转向全球软硬件方案供应商，将整车平台、自动驾驶算法、后台调度系统打包交付海外出行企业。TrendForce预测2035年中国Robotaxi市场规模将达445亿美元。","importance":4,"overview":"小鹏Robotaxi进入员工内测阶段，定位全球软硬件方案供应商角色"},{"title":"楚航科技马来西亚海外生产基地正式投入运营，毫米波雷达产品辐射南亚市场","source":"盖世汽车","source_type":"media","url":"#no-url-12","publish_date":"2026-07-09","window":"2026-07-09","category":"项目动态","summary":"7月9日，楚航科技宣布位于马来西亚吉隆坡的海外生产基地正式投入运营。该基地与马来西亚上市公司MCE Holdings合作，主要负责研发与生产应用于智慧出行领域的毫米波雷达产品。公司已获得马来西亚本土汽车品牌Perodua项目订单并实现规模化量产交付，是国内少数实现毫米波雷达产品出口的厂商之一。60GHz生命体探测雷达全系产品已通过欧盟CE认证。","importa title":"小鹏Robotaxi进入员工内测阶段，定位全球软硬件方案供应商角色","source":"盖世汽车","source_type":"media","url":"https://auto.gasgoo.com/news/202607/9I70465092C601.shtml","publish_date":"2026-07-09","window":"2026-07-09","category":"项目动态","summary":"小鹏召开Robotaxi业务首次全员会议，宣布该业务正式进入员工内测阶段。Robotaxi将作为集团物理AI与「机器人汽车」战略的核心载体。小鹏规划重心不在自建车队，而是转向全球软硬件方案供应商，将整车平台、自动驾驶算法、后台调度系统打包交付海外出行企业。TrendForce预测2035年中国Robotaxi市场规模将达445亿美元。","importance":4,"overview":"小鹏Robotaxi进入员工内测阶段，定位全球软硬件方案供应商角色"},{"title":"楚航科技马来西亚海外生产基地正式投入运营，毫米波雷达产品辐射南亚市场","source":"盖世汽车","source_type":"media","url":"https://auto.gasgoo.com/news/202607/9I70465093C601.shtml","publish_date":"2026-07-09","window":"2026-07-09","category":"项目动态","summary":"7月9日，楚航科技宣布位于马来西亚吉隆坡的海外生产基地正式投入运营。该基地与马来西亚上市公司MCE Holdings合作，主要负责研发与生产应用于智慧出行领域的毫米波雷达产品。公司已获得马来西亚本土汽车品牌Perodua项目订单并实现规模化量产交付，是国内少数实现毫米波雷达产品出口的厂商之一。60GHz生命体探测雷达全系产品已通过欧盟CE认证。","importance":5,"overview":"楚航科技马来西亚海外生产基地正式投入运营，毫米波雷达产品辐射南亚市场"},{"title":"Waymo在拉斯维加斯启动完全无人驾驶运营，2026年底前冲刺每周100万次行程","source":"盖世汽车","source_type":"media","url":"https://auto.gasgoo.com/news/202607/9I70465025C601.shtml","publish_date":"2026-07-09","window":"2026-07-09","category":"项目动态","summary":"当地时间7月8日，Alphabet旗下Waymo在拉斯维加斯启动完全无人驾驶运营，车内无安全员。Waymo同时宣布丹佛、圣地亚哥和坦帕将成为下一批部署城市。目前Waymo运营约3500辆robotaxi，累计完成超2000万次行程。公司此前完成160亿美元融资估值1260亿美元，目标2026年底前每周100万次付费行程，随后拓展至伦敦和东京等国际市场。","importance":5,"overview":"Waymo在拉斯维加斯启动完全无人驾驶运营，2026年底前冲刺每周100万次行程"},{"title":"2026年6月汽车工业经济运行情况：新能源汽车产销增长超23%，渗透率近六成","source":"工信部装备工业一司","source_type":"gov","url":"https://www.miit.gov.cn/jgsj/zbys/qcgy/art/2026/art_1ff554c909a142cdb56b188a9a9a7f2f.html","publish_date":"2026-07-09","window":"2026-07-09","category":"行业动态","summary":"工信部发布2026年6月汽车工业经济运行情况。6月汽车产销分别完成276万辆和281万辆，同比下降1.2%和3.2%。新能源汽车产销分别完成159.8万辆和164.3万辆，同比增长26%和23.6%，新车渗透率达58.5%。1-6月新能源汽车产销累计743.8万辆和744.6万辆，同比增长6.7%和7.3%，渗透率49.6%。6月汽车整车出口103.7万辆，同比增长75.1%，其中新能源汽车出口52.3万辆，同比增长1.6倍。","importance":4,"overview":"2026年6月汽车工业经济运行情况：新能源汽车产销增长超23%，渗透率近六成"},{"title":"全国统一无人车上路标准正式实施，GA/T 2388-2026 重塑无人物流合规运营新秩序","source":"腾讯新闻","source_type":"media","url":"#no-url-1","publish_date":"2026-07-08","window":"2026-07-08","category":"政策法规","summary":"公安部发布的《智能网联汽车道路测试与示范应用安全通行规范》（GA/T 2388-2026）正式实施，成为国内首个统一覆盖 L3 及以上高阶自动驾驶车辆的道路通行安全准则。该标准适用城市道路、普通公路、开放示范区等场景，对近两年快速扩张的无人物流、无人末端配送、自动驾驶城配货运等行业形成全国统一的合规运营底线，标志着无人物流车行业告别野蛮生长、迈入规范化发展新阶段。","importance":3,"overview":"全国统一无人车上路标准正式实施，GA/T 2388-2026 重塑无人物流合规运营新秩序"},{"title":"中国首部 L3/L4 自动驾驶强制国标即将落地，2027 年 7 月实施倒计时","source":"搜狐汽车","source_type":"media","url":"#no-url-2","publish_date":"2026-07-08","window":"2026-07-08","category":"标准动态","summary":"工信部就《智能网联汽车 自动驾驶系统安全要求》强制国标（报批稿）公开征求意见，建议实施日期为 2027 年 7 月 1 日。该国标是首部针对 L3 有条件自动驾驶和 L4 高度自动驾驶的强制性国家标准，意味着所有宣称搭载 L3/L4 功能的新车须达标后方可申报公告、禁止上市销售，与已发布的组合驾驶辅助强制国标形成「L2+L3+L4」三段式强制标准体系，中国自动驾驶治理体系由此完成闭环。","importance":5,"overview":"中国首部 L3/L4 自动驾驶强制国标即将落地，2027 年 7 月实施倒计时"},{"title":"Momenta 正式登陆港交所，成为「物理 AI 第一股」，市值超 700 亿港元","source":"盖世汽车","source_type":"media","url":"#no-url-3","publish_date":"2026-07-08","window":"2026-07-08","category":"投融资动态","summary":"7 月 8 日，Momenta 以每股 295.6 港元发行价在港交所正式挂牌上市（股票代码 6880.HK），开盘涨超 6%，总市值超 700 亿港元。此次 IPO 引入 GIC、富达、比亚迪、奔驰等 14 家基石投资者，公开认购超 400 倍，机构抢筹超 1000 亿港元。Momenta 是全球城市 NOA 解决方案销量第一的独立智驾方案提供商，上市后被资本市场赋予「物理 AI 第一股」称号，标志着智能驾驶赛道资本化进入新阶段。","importance":5,"overview":"Momenta 正式登陆港交所，成为「物理 AI 第一股」，市值超 700 亿港元"},{"title":"东风汽车率先实现国内自主线控转向系统量产落地，首款车型通过工信部公告","source":"盖世汽车","source_type":"media","url":"#no-url-4","publish_date":"2026-07-08","window":"2026-07-08","category":"技术动态","summary":"东风汽车首款搭载自主线控转向（SBW）系统的量产车型正式通过工信部公告。在 2026 年 7 月 1 日线控转向国标实施后，东风成为国内首家实现自主 SBW 系统量产落地的车企。线控转向取消了传统转向柱的机械连接，为高阶自动驾驶的底盘线控化奠定关键技术基础，对提升 L3/L4 级自动驾驶的冗余安全性和驾舱布局灵活性意义深远。","importance":5,"overview":"东风汽车率先实现国内自主线控转向系统量产落地，首款车型通过工信部公告"},{"title":"华为乾崑半年车主报告：97.86% 用户用智驾，人均每天辅助驾驶 19 公里","source":"新浪科技 / 快科技","source_type":"media","url":"#no-url-5","publish_date":"2026-07-08","window":"2026-07-08","category":"技术动态","summary":"鸿蒙智行发布半年车主用车报告，披露华为乾崑智驾真实使用数据：截至今年 6 月底，使用过智驾功能的活跃车主达 121 function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.querySelector('.nav-link[data-tab="'+tab+'"]').classList.add('active');
  if (tab === 'daily') renderCalendar();
  if (tab === 'weekly') renderWeekly();
}

/* === 日历 === */
const WD = ['日','一','二','三','四','五','六'];
let calDate = new Date();
let selectedDate = null;

function calMonth(d) { calDate.setMonth(calDate.getMonth()+d); renderCalendar(); }

function renderCalendar() {
  const y = calDate.getFullYear(), m = calDate.getMonth();
  document.getElementById('calMonthLabel').textContent = y+'年'+(m+1)+'月';
  const fd = new Date(y,m,1).getDay();
  const dim = new Date(y,m+1,0).getDate();
  let html = '';
  WD.forEach(w => html += '<div class="calendar-weekday">'+w+'</div>');
  for (let i=0;i<fd;i++) html += '<div class="calendar-day empty"></div>';
  for (let d=1;d<=dim;d++) {
    const s = y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const has = DATA.daily[s];
    let cls = 'calendar-day';
    if (has) cls += ' has-report';
    if (s === selectedDate) cls += ' selected';
    let oc = '';
    if (has) oc = ' onclick="selectDate(\''+s+'\')"';
    html += '<div class="'+cls+'"'+oc+'>'+d+'</div>';
  }
  document.getElementById('calGrid').innerHTML = html;
}

function selectDate(s) {
  selectedDate = s;
  renderCalendar();
  renderDaily(s);
}

function renderDaily(s) {
  const viewer = document.getElementById('dailyViewer');
  const data = DATA.daily[s];
  if (!data) {
    viewer.innerHTML = '<div class="empty-state"><div style="font-size:32px">📭</div><div>'+s+' 暂无日报</div></div>';
    return;
  }
  const weekdays = ['','周一','周二','周三','周四','周五','周六','周日'];
  const dt = new Date(s);
  const wd = weekdays[dt.getDay() || 7];
  let html = '<div class="hero-section" style="padding:24px 0 12px"><div class="hero-title" style="font-size:1.5rem">智能网联汽车 <span style="color:var(--color-accent)">日报</span></div><div class="hero-subtitle">'+s+' '+wd+' · 共 '+data.total+' 条资讯 · '+formatCats(data.categories)+'</div></div>';
  const catOrder = ['政策法规','标准动态','投融资动态','技术动态','项目动态','行业动态'];
  const cats = data.categories;
  for (const cat of catOrder) {
    if (!cats[cat]) continue;
    const items = data.articles.filter(a => a.category === cat);
    html += '<div class="cat-section"><h2>📌 '+cat+'</h2><span class="cat-count">'+items.length+' 条</span></div>';
    for (const a of items) {
      const summary = a.summary || '（暂无摘要）';
      html += '<div class="article-card">';
      html += '<a class="article-title" href="'+escAttr(a.url)+'" target="_blank" rel="noopener noreferrer">'+escHtml(a.title)+'</a>';
      html += '<div class="article-meta"><span>📰 '+escHtml(a.source || '')+'</span><span>📅 '+escHtml(a.publish_date || s)+'</span></div>';
      html += '<div class="article-summary">'+escHtml(summary)+'</div>';
      html += '</div>';
    }
  }
  // 未在6类中的兜底
  const known = new Set(catOrder);
  const others = data.articles.filter(a => !known.has(a.category));
  for (const a of others) {
    html += '<div class="cat-section"><h2>📌 '+(a.category || '未分类')+'</h2></div>';
    html += '<div class="article-card"><a class="article-title" href="'+escAttr(a.url)+'" target="_blank" rel="noopener noreferrer">'+escHtml(a.title)+'</a>';
    html += '<div class="article-meta"><span>📰 '+escHtml(a.source || '')+'</span><span>📅 '+escHtml(a.publish_date || s)+'</span></div>';
    html += '<div class="article-summary">'+escHtml(a.summary || '（暂无摘要）')+'</div></div>';
  }
  viewer.innerHTML = html;
}

function formatCats(cats) {
  return Object.entries(cats).map(([k,v]) => k+' '+v+'条').join(' · ');
}

/* === 周报 === */
function renderWeekly() {
  // 默认显示上周
  const today = new Date();
  const day = today.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  const monday = new Date(today); monday.setDate(today.getDate() + diff);
  const lastMonday = new Date(monday); lastMonday.setDate(monday.getDate() - 7);
  const lastSunday = new Date(lastMonday); lastSunday.setDate(lastMonday.getDate() + 6);
  const startStr = lastMonday.toISOString().slice(0,10);
  const endStr = lastSunday.toISOString().slice(0,10);
  const defaultWeek = DATA.weekly[startStr];
  if (defaultWeek) {
    renderWeeklyViewer(defaultWeek);
  } else {
    document.getElementById('weeklyViewer').innerHTML = '<div class="empty-state"><div style="font-size:32px">📋</div><div>本周暂无周报</div></div>';
  }
  // 往期回顾
  const grid = document.getElementById('weeklyPastGrid');
  const weeks = Object.keys(DATA.weekly).sort().reverse();
  if (weeks.length === 0) {
    grid.innerHTML = '<span style="font-size:.85rem;color:var(--color-text-muted)">暂无往期周报</span>';
    return;
  }
  grid.innerHTML = '';
  weeks.forEach(w => {
    const endDate = new Date(w); endDate.setDate(endDate.getDate() + 6);
    const label = w.slice(5).replace('-','月')+'日 ~ '+endDate.toISOString().slice(5).replace('-','月')+'日';
    const item = document.createElement('div');
    item.className = 'past-item';
    item.innerHTML = '<span class="past-item-icon">📋</span><span>'+label+'</span><span class="past-item-date">'+w+'</span>';
    item.onclick = () => {
      document.querySelectorAll('#weeklyPastGrid .past-item').forEach(el => el.classList.remove('active'));
      item.classList.add('active');
      renderWeeklyViewer(DATA.weekly[w]);
      window.scrollTo({top:0,behavior:'smooth'});
    };
    grid.appendChild(item);
  });
}

function renderWeeklyViewer(data) {
  document.getElementById('weeklyHeroTitle').textContent = data.week_start+' ~ '+data.week_end;
  const ws = data.week_start, we = data.week_end;
  const catKeys = Object.keys(data.categories);
  const catTags = catKeys.map(c => c+' '+data.categories[c]+'条').join('  ·  ');
  document.getElementById('weeklyHeroSub').innerHTML = '共 '+data.total+' 条资讯'+(catKeys.length ? '  ·  '+catTags : '');
  const viewer = document.getElementById('weeklyViewer');
  const catOrder = ['政策法规','标准动态','投融资动态','技术动态','项目动态','行业动态'];
  let html = '';
  for (const cat of catOrder) {
    const items = data.articles.filter(a => a.category === cat);
    if (items.length === 0) continue;
    html += '<div class="cat-section"><h2>📌 '+cat+'</h2><span class="cat-count">'+items.length+' 条</span></div>';
    for (const a of items) {
      const summary = a.summary || '（暂无摘要）';
      html += '<div class="article-card">';
      html += '<a class="article-title" href="'+escAttr(a.url)+'" target="_blank" rel="noopener noreferrer">'+escHtml(a.title)+'</a>';
      html += '<div class="article-meta"><span>📰 '+escHtml(a.source || '')+'</span><span>📅 '+escHtml(a.publish_date || '')+'</span></div>';
      html += '<div class="article-summary">'+escHtml(summary)+'</div>';
      html += '</div>';
    }
  }
  viewer.innerHTML = html;
}

/* === 工具 === */
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) { return escHtml(s).replace(/'/g,'&#39;'); }

/* === 初始化 === */
document.addEventListener('DOMContentLoaded', () => {
  // 默认选中最新一天
  const dates = Object.keys(DATA.daily).sort().reverse();
  if (dates.length > 0) {
    const firstDate = dates[0];
    calDate = new Date(parseInt(firstDate.slice(0,4)), parseInt(firstDate.slice(5,7))-1, 1);
    selectedDate = firstDate;
  }
  renderCalendar();
  if (selectedDate) renderDaily(selectedDate);
});
</script>
