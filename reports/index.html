<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能网联汽车新闻 · 报告</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Noto Sans SC','PingFang SC',sans-serif;background:#f8f6f2;color:#1f1b16;line-height:1.7}
.container{max-width:720px;margin:0 auto;padding:32px 24px}
h1{font-size:1.5rem;font-weight:600;margin-bottom:6px}
.sub{color:#6b6258;font-size:0.85rem;margin-bottom:24px}
.section{margin-bottom:28px}
.section h2{font-size:1rem;font-weight:600;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid #e8e2d9}
.list{list-style:none}
.list li{margin-bottom:4px}
.list a{display:block;padding:8px 12px;background:#fff;border:1px solid #e8e2d9;border-radius:8px;color:#1f1b16;text-decoration:none;font-size:0.88rem;transition:all 0.15s}
.list a:hover{background:#f0ece4;border-color:#c9c0b2}
.list .meta{font-size:0.72rem;color:#a89f94;margin-top:2px}
.empty{color:#a89f94;font-size:0.85rem;padding:8px 0}
</style>
</head>
<body>
<div class="container">
  <h1>⚡ 智能网联汽车新闻</h1>
  <p class="sub">自动化监测 · 报告存档</p>

  <div class="section">
    <h2>📰 日报</h2>
    <ul class="list" id="dailyList"></ul>
  </div>

  <div class="section">
    <h2>📋 周报</h2>
    <ul class="list" id="weeklyList"></ul>
  </div>
</div>
<script>
fetch('/reports.json').then(r=>r.json()).catch(()=>{
  // fallback: list from directory structure
  document.getElementById('dailyList').innerHTML='<li class="empty">日报文件列表加载中...</li>';
});
</script>
</body>
</html>
