name: 每日采集 & 部署

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖 & Playwright 浏览器
        run: |
          pip install -r requirements.txt
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: 采集新闻（Playwright 直采）
        run: python scripts/collect_ci.py

      - name: 数据库迁移（补足缺失列）
        run: |
          python -c "
          import sqlite3
          conn = sqlite3.connect('data/icv_news.db')
          for col, dtype in [('is_deleted','INTEGER DEFAULT 0'),('needs_review','INTEGER DEFAULT 0'),('review_reason','TEXT')]:
              try: conn.execute(f'ALTER TABLE articles ADD COLUMN {col} {dtype}')
              except: pass
          conn.execute('CREATE TABLE IF NOT EXISTS articles_deleted_audit (id INTEGER, title TEXT, source TEXT, url TEXT, category TEXT, publish_date TEXT, window TEXT, deleted_at DATETIME, delete_reason TEXT, original_row_json TEXT)')
          conn.commit()
          conn.close()
          print('Schema migration OK')
          "

      - name: 生成概览文本
        run: python scripts/generate_overview.py --force || true

      - name: 生成日报
        run: |
          TODAY=$(date +%Y-%m-%d)
          YESTERDAY=$(date -d 'yesterday' +%Y-%m-%d)
          python scripts/gen_report.py "$TODAY" v1 "$YESTERDAY"

      - name: 生成周报
        run: python scripts/gen_weekly_report.py || true

      - name: 提交更新
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add -A
          git diff --staged --quiet || git commit -m "每日更新 $(date +%Y-%m-%d)"
          git push

      - name: 部署到 Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./reports
          enable_jekyll: false
