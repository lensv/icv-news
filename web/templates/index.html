<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能网联汽车新闻 · 报告入口</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Outfit:wght@300;400;500;600;700;800&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-deep: #f8f6f2;
  --bg-surface: #ffffff;
  --bg-card: #ffffff;
  --bg-card-hover: #faf8f4;
  --bg-glass: rgba(255,255,255,0.88);
  --color-accent: #c27803;
  --color-accent-dim: rgba(194,120,3,0.08);
  --color-accent-glow: rgba(194,120,3,0.06);
  --color-text: #1f1b16;
  --color-text-secondary: #6b6258;
  --color-text-muted: #a89f94;
  --color-border: #e8e2d9;
  --color-border-light: #ddd6cb;
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 24px;
  --shadow-card: 0 1px 2px rgba(31,27,22,0.05), 0 1px 6px rgba(31,27,22,0.04);
  --shadow-hover: 0 8px 30px rgba(31,27,22,0.08);
  --font-display: 'DM Serif Display', serif;
  --font-sans: 'Outfit', sans-serif;
  --font-body: 'Noto Sans SC', 'Outfit', sans-serif;
  --transition: 0.3s cubic-bezier(0.4,0,0.2,1);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{font-size:15px;scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{
  font-family:var(--font-body);background:var(--bg-deep);color:var(--color-text);
  min-height:100vh;overflow-x:hidden;line-height:1.6;
}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--color-border-light);border-radius:3px}
h1,h2,h3,h4{font-family:var(--font-sans);font-weight:700;letter-spacing:-0.02em}
.display{font-family:var(--font-display);font-weight:400}

/* Nav */
.nav{position:sticky;top:0;z-index:100;background:rgba(248,246,242,0.92);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border-bottom:1px solid var(--color-border);padding:0 24px}
.nav-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:32px;height:64px}
.nav-brand{display:flex;align-items:center;gap:10px;font-family:var(--font-sans);font-weight:700;font-size:1rem;color:var(--color-text);letter-spacing:-0.3px;text-decoration:none;white-space:nowrap}
.nav-brand-icon{width:32px;height:32px;background:linear-gradient(135deg,#c27803,#a06402);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff}
.nav-links{display:flex;gap:4px;flex:1}
.nav-link{padding:8px 20px;border-radius:var(--radius-sm);font-size:0.85rem;font-weight:500;color:var(--color-text-secondary);cursor:pointer;transition:var(--transition);border:none;background:transparent;font-family:var(--font-sans);letter-spacing:0.3px;position:relative}
.nav-link:hover{color:var(--color-text);background:var(--color-accent-dim)}
.nav-link.active{color:var(--color-accent);background:var(--color-accent-dim)}
.nav-link.active::after{content:'';position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);width:60%;height:2px;background:var(--color-accent);border-radius:1px}
.nav-badge{padding:4px 12px;border-radius:100px;background:var(--color-accent-dim);border:1px solid rgba(194,120,3,0.2);font-size:0.7rem;color:var(--color-accent);font-weight:600;letter-spacing:0.5px;white-space:nowrap}

.container{max-width:1200px;margin:0 auto;padding:0 24px;position:relative}
.tab-content{display:none;animation:fadeIn 0.35s ease}
.tab-content.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ============================================================
   日报 — Calendar
   ============================================================ */
.calendar-section{padding:28px 0 20px}
.calendar-nav{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:16px}
.calendar-nav-btn{background:var(--bg-card);border:1px solid var(--color-border);border-radius:var(--radius-sm);padding:6px 14px;cursor:pointer;font-size:0.85rem;color:var(--color-text-secondary);transition:var(--transition);font-family:var(--font-sans)}
.calendar-nav-btn:hover{background:var(--bg-card-hover);color:var(--color-text);border-color:var(--color-accent)}
.calendar-month{font-family:var(--font-display);font-size:1.3rem;color:var(--color-text);min-width:140px;text-align:center}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;background:var(--bg-card);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:10px;overflow:hidden}
.calendar-weekday{text-align:center;font-size:0.72rem;color:var(--color-text-muted);padding:6px 0;font-weight:500;letter-spacing:0.5px}
.calendar-day{text-align:center;padding:6px 0;border-radius:var(--radius-sm);font-size:0.85rem;color:var(--color-text-secondary);cursor:pointer;transition:var(--transition);position:relative;min-height:32px;display:flex;align-items:center;justify-content:center}
.calendar-day:hover{background:var(--color-accent-dim);color:var(--color-accent)}
.calendar-day.has-report{color:var(--color-text);font-weight:600}
.calendar-day.has-report::after{content:'';position:absolute;bottom:3px;width:4px;height:4px;border-radius:50%;background:var(--color-accent)}
.calendar-day.selected{background:var(--color-accent);color:#fff;font-weight:700}
.calendar-day.selected::after{background:#fff}
.calendar-day.empty{cursor:default}
.calendar-day.empty:hover{background:transparent}
.calendar-today{font-weight:700;color:var(--color-text)}
.calendar-today.has-report::after{background:var(--color-text)}

/* Report viewer */
.report-viewer{margin-top:0;margin-bottom:32px}
.report-viewer iframe{width:100%;border:none;border-radius:var(--radius-lg);background:var(--bg-surface);box-shadow:var(--shadow-card);min-height:600px}
.report-viewer .loading{padding:80px;text-align:center;color:var(--color-text-muted)}
.report-viewer .loading .spinner{width:28px;height:28px;border:2px solid var(--color-border);border-top-color:var(--color-accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.report-viewer .empty-state{padding:60px;text-align:center;color:var(--color-text-muted);background:var(--bg-card);border:1px solid var(--color-border);border-radius:var(--radius-md)}
.report-viewer .empty-state .icon{font-size:2.5rem;margin-bottom:8px;opacity:0.4}

/* ============================================================
   周报 / 月报
   ============================================================ */
.hero-section{padding:28px 0 16px}
.hero-title{font-family:var(--font-display);font-size:clamp(1.5rem,3vw,2.2rem);color:var(--color-text);line-height:1.2;margin-bottom:4px}
.hero-title span{color:var(--color-accent)}
.hero-subtitle{font-size:0.85rem;color:var(--color-text-secondary);font-weight:300;letter-spacing:0.3px}

.weekly-content{display:flex;flex-direction:column;gap:20px;padding-bottom:40px}
.weekly-viewer iframe,.monthly-viewer iframe{width:100%;border:none;border-radius:var(--radius-lg);background:var(--bg-surface);box-shadow:var(--shadow-card);min-height:600px}
.weekly-viewer .loading,.monthly-viewer .loading{padding:80px;text-align:center;color:var(--color-text-muted)}
.weekly-viewer .loading .spinner,.monthly-viewer .loading .spinner{width:28px;height:28px;border:2px solid var(--color-border);border-top-color:var(--color-accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
.weekly-viewer .empty-state,.monthly-viewer .empty-state{padding:60px;text-align:center;color:var(--color-text-muted);background:var(--bg-card);border:1px solid var(--color-border);border-radius:var(--radius-md)}
.weekly-viewer .empty-state .icon,.monthly-viewer .empty-state .icon{font-size:2.5rem;margin-bottom:8px;opacity:0.4}

/* Past issues — list style */
.past-section{margin-top:16px;padding-top:16px;border-top:1px solid var(--color-border)}
.past-header{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.past-header h3{font-family:var(--font-sans);font-size:0.95rem;font-weight:600;color:var(--color-text);letter-spacing:0.3px}
.past-line{flex:1;height:1px;background:linear-gradient(90deg,var(--color-border-light),transparent)}
.past-list{display:flex;flex-direction:column;gap:6px}
.past-item{
  display:flex;align-items:center;gap:8px;
  padding:10px 14px;
  background:transparent;border-radius:var(--radius-sm);
  font-size:0.85rem;color:var(--color-text-secondary);cursor:pointer;
  transition:var(--transition);font-family:var(--font-body);
  border-left:3px solid transparent;
}
.past-item:hover{background:var(--bg-card-hover);color:var(--color-text);border-left-color:var(--color-accent)}
.past-item.active{background:var(--bg-card);color:var(--color-text);border-left-color:var(--color-accent);font-weight:500}
.past-item-icon{
  width:18px;height:18px;border:1.5px solid var(--color-border-light);border-radius:3px;
  display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--color-text-muted);flex-shrink:0;transition:var(--transition)
}
.past-item:hover .past-item-icon{border-color:var(--color-accent);color:var(--color-accent)}
.past-item.active .past-item-icon{border-color:var(--color-accent);color:var(--color-accent);background:var(--color-accent-dim)}
.past-item-title{flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.past-item-date{font-size:0.75rem;color:var(--color-text-muted);flex-shrink:0}

/* Loading shimmer */
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.shimmer{background:linear-gradient(90deg,var(--bg-card) 25%,var(--bg-card-hover) 50%,var(--bg-card) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite}

@media(max-width:768px){
  .nav{padding:0 16px}.nav-inner{gap:12px;height:56px}.nav-link{padding:6px 12px;font-size:0.78rem}.nav-badge{display:none}
  .container{padding:0 16px}
  .calendar-grid{padding:6px;gap:2px}
  .calendar-day{font-size:0.78rem;min-height:28px}
  .calendar-month{font-size:1.1rem}
  .report-viewer iframe,.weekly-viewer iframe,.monthly-viewer iframe{min-height:400px}
  .past-item{padding:8px 12px;font-size:0.78rem}
}

/* ============================================================
   全局文章弹窗（父页面级，iframe 内通过 postMessage 触发）
   ============================================================ */
.article-modal-overlay {
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(31,27,22,0.35); backdrop-filter:blur(6px);
  z-index:2000; display:none;
  align-items:flex-start; justify-content:center;
  padding:60px 24px 40px;
  overflow-y:auto;
}
.article-modal-overlay.active { display:flex; }
.article-modal {
  background:var(--bg-surface,#fff); border:1px solid var(--color-border,#e2e8f0);
  border-radius:var(--radius-lg,16px);
  max-width:700px; width:100%;
  overflow:hidden;
  animation:articleModalIn 0.25s ease;
  box-shadow:0 20px 60px rgba(31,27,22,0.12);
  margin-top:20px;
}
@keyframes articleModalIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.article-modal-header {
  padding:24px 24px 0;
  position:relative;
}
.article-modal-close {
  position:absolute; top:12px; right:12px;
  background:none; border:none; color:var(--color-text-muted,#94a3b8);
  font-size:1.1rem; cursor:pointer;
  width:28px; height:28px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.2s;
}
.article-modal-close:hover { background:#f1f5f9; color:var(--color-text,#334155); }
.article-modal-title {
  font-family:var(--font-sans,'Outfit',sans-serif);
  font-size:1rem; font-weight:600;
  color:var(--color-text,#0f172a); line-height:1.5;
  margin-bottom:6px; padding-right:28px;
}
.article-modal-meta {
  font-size:0.78rem; color:var(--color-text-muted,#94a3b8);
  margin-bottom:10px; padding-bottom:10px;
  border-bottom:1px solid var(--color-border-light,#e2e8f0);
}
.article-modal-body {
  padding:16px 24px;
  font-size:0.88rem; line-height:1.8;
  color:var(--color-text-secondary,#475569);
  white-space:pre-wrap;
  max-height:60vh;
  overflow-y:auto;
}
.article-modal-footer {
  padding:12px 24px 20px;
  border-top:1px solid var(--color-border-light,#e2e8f0);
}
.article-modal-link {
  display:inline-flex; align-items:center; gap:6px;
  padding:8px 20px;
  background:var(--color-accent-dim,rgba(194,120,3,0.08));
  border:1px solid rgba(194,120,3,0.2);
  border-radius:var(--radius-sm,8px);
  font-size:0.82rem; font-weight:500;
  color:var(--color-accent,#c27803);
  text-decoration:none;
  transition:all 0.2s;
}
.article-modal-link:hover {
  background:var(--color-accent,#c27803);
  color:#fff;
}
</style>
</head>
<body>

<!-- Nav -->
<nav class="nav">
  <div class="nav-inner">
    <a class="nav-brand" href="/"><div class="nav-brand-icon">⚡</div>智能网联汽车新闻</a>
    <div class="nav-links">
      <button class="nav-link active" data-tab="daily" onclick="switchTab('daily')">📰 日报</button>
      <button class="nav-link" data-tab="weekly" onclick="switchTab('weekly')">📋 周报</button>
      <button class="nav-link" data-tab="monthly" onclick="switchTab('monthly')" style="display:none">📅 月报</button>
    </div>
    <div class="nav-actions"></div>
  </div>
</nav>

<div class="container">

<!-- ============================================================
     TAB: 日报
     ============================================================ -->
<div class="tab-content active" id="tab-daily">
  <div class="calendar-section">
    <div class="calendar-nav">
      <button class="calendar-nav-btn" onclick="calMonth(-1)">←</button>
      <span class="calendar-month" id="calMonthLabel"></span>
      <button class="calendar-nav-btn" onclick="calMonth(1)">→</button>
    </div>
    <div class="calendar-grid" id="calGrid"></div>
  </div>
  <div class="report-viewer" id="dailyViewer">
    <div class="empty-state"><div class="icon">📰</div><div>选择一个日期查看日报</div></div>
  </div>
</div>

<!-- ============================================================
     TAB: 周报
     ============================================================ -->
<div class="tab-content" id="tab-weekly">
  <div class="hero-section" id="weeklyHero">
    <div class="hero-title"><span>智能网联汽车新闻</span> 周报</div>
    <div class="hero-subtitle" id="weeklyHeroSub">智能网联汽车每周新闻综述</div>
  </div>
  <div class="weekly-content">
    <div class="weekly-viewer" id="weeklyViewer">
      <div class="loading"><div class="spinner"></div>加载周报…</div>
    </div>
    <div class="past-section" id="weeklyPast">
      <div class="past-header">
        <h3>📋 往期回顾</h3>
        <div class="past-line"></div>
      </div>
      <div class="past-grid" id="weeklyPastGrid"></div>
    </div>
  </div>
</div>

<!-- ============================================================
     TAB: 月报
     ============================================================ -->
<div class="tab-content" id="tab-monthly">
  <div class="hero-section">
    <div class="hero-title"><span>月报</span> 总览</div>
    <div class="hero-subtitle">月度智能网联汽车新闻汇总</div>
  </div>
  <div class="weekly-content">
    <div class="monthly-viewer" id="monthlyViewer">
      <div class="empty-state"><div class="icon">📅</div><div>月报功能即将上线</div></div>
    </div>
    <div class="past-section" id="monthlyPast">
      <div class="past-header">
        <h3>📅 往期回顾</h3>
        <div class="past-line"></div>
      </div>
      <div class="past-grid" id="monthlyPastGrid"></div>
    </div>
  </div>
</div>

</div>

<!-- ============================================================
     全局文章弹窗（跨 iframe）
     ============================================================ -->
<div class="article-modal-overlay" id="articleModalOverlay" onclick="closeArticleModal(event)">
  <div class="article-modal" onclick="event.stopPropagation()">
    <div class="article-modal-header">
      <button class="article-modal-close" onclick="closeArticleModal()">✕</button>
      <div class="article-modal-title" id="articleModalTitle"></div>
      <div class="article-modal-meta" id="articleModalMeta"></div>
    </div>
    <div class="article-modal-body" id="articleModalBody"></div>
    <div class="article-modal-footer" id="articleModalFooter">
      <a class="article-modal-link" id="articleModalLink" href="#" target="_blank" rel="noopener noreferrer">
        <span>🔗</span> 查看原文
      </a>
    </div>
  </div>
</div>

<script>
// ============================================================
// State
// ============================================================
let reportsData = null;
let calDate = new Date();
let selectedDate = null;
let weeklyReports = [];
let monthlyReports = [];
let currentWeeklyIdx = 0;
let iframeIdCounter = 0;

// ============================================================
// API
// ============================================================
async function api(url) {
  try { const r = await fetch(url); return await r.json(); }
  catch(e) { console.error(e); return null; }
}

// ============================================================
// Init
// ============================================================
document.addEventListener('DOMContentLoaded', async () => {
  // Daily: load from DB API
  const availableDates = await api('/api/available-dates');
  if (!availableDates) return;
  // Build a map for quick lookup
  window._availableDates = availableDates;
  window._dateMap = {};
  availableDates.forEach(d => { window._dateMap[d.date] = d; });

  // Weekly/monthly: load from static reports
  reportsData = await api('/api/reports');
  if (reportsData) {
    weeklyReports = reportsData.weekly || [];
    monthlyReports = reportsData.monthly || [];
  }
  initCalendar();
  initWeekly();
  initMonthly();
});

// ============================================================
// Tab switch
// ============================================================
function switchTab(tab) {
  document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
  document.querySelector(`.nav-link[data-tab="${tab}"]`).classList.add('active');
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  // Refresh iframe heights when tab shown
  if (tab === 'daily' && selectedDate) loadDailyReport(selectedDate);
  if (tab === 'weekly') setTimeout(fitIframes, 200);
  if (tab === 'monthly') setTimeout(fitIframes, 200);
}

// Auto-resize iframes
function fitIframes() {
  document.querySelectorAll('.report-viewer iframe, .weekly-viewer iframe, .monthly-viewer iframe').forEach(iframe => {
    try {
      iframe.style.height = iframe.contentWindow.document.body.scrollHeight + 'px';
    } catch(e) {}
  });
}

// ============================================================
// Calendar
// ============================================================
function initCalendar() {
  const todayStr = new Date().toISOString().slice(0,10);
  // 默认显示今天
  selectedDate = todayStr;
  // 跳转到今天所在月份
  const [y, m] = todayStr.split('-').map(Number);
  calDate = new Date(y, m - 1, 1);
  renderCalendar();
}

function calMonth(delta) {
  calDate.setMonth(calDate.getMonth() + delta);
  renderCalendar();
}

function renderCalendar() {
  const year = calDate.getFullYear();
  const month = calDate.getMonth();
  const todayStr = new Date().toISOString().slice(0,10);

  document.getElementById('calMonthLabel').textContent = `${year}年${month+1}月`;

  const availableDates = window._availableDates || [];
  const dateMap = window._dateMap || {};

  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  const weekdays = ['日','一','二','三','四','五','六'];
  let html = '';
  weekdays.forEach(d => { html += `<div class="calendar-weekday">${d}</div>`; });
  for (let i = 0; i < firstDay; i++) {
    html += '<div class="calendar-day empty"></div>';
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const hasReport = dateMap[dateStr];
    const isSelected = dateStr === selectedDate;
    const isToday = dateStr === todayStr;
    let cls = 'calendar-day';
    if (hasReport) cls += ' has-report';
    if (isSelected) cls += ' selected';
    if (isToday) cls += ' calendar-today';
    html += `<div class="${cls}" onclick="selectDate('${dateStr}')">${d}</div>`;
  }
  document.getElementById('calGrid').innerHTML = html;

  if (selectedDate) loadDailyReport(selectedDate);
}

function selectDate(dateStr) {
  selectedDate = dateStr;
  renderCalendar();
  loadDailyReport(dateStr);
}

// ============================================================
// Load Daily Report — 直接从 DB 实时渲染
// ============================================================
const CAT_ICONS = {
  '政策法规': '📋', '标准动态': '📐', '投融资动态': '💰',
  '技术动态': '⚙️', '项目动态': '🚀', '行业动态': '📊'
};
const CAT_ORDER = ['政策法规','标准动态','投融资动态','技术动态','项目动态','行业动态'];

async function loadDailyReport(dateStr) {
  const viewer = document.getElementById('dailyViewer');
  viewer.innerHTML = '<div class="loading"><div class="spinner"></div>加载中…</div>';

  const data = await api(`/api/daily-data/${dateStr}`);
  if (!data || data.total === 0) {
    viewer.innerHTML = `<div class="empty-state"><div class="icon">📭</div><div>${dateStr} 暂无日报</div></div>`;
    return;
  }

  // Group articles by category
  const byCat = {};
  data.articles.forEach(a => {
    const cat = a.category || '其他';
    if (!byCat[cat]) byCat[cat] = [];
    byCat[cat].push(a);
  });

  let html = '';
  // Hero
  html += `<div style="padding:28px 0 16px;text-align:center">`;
  html += `<div style="font-family:var(--font-display);font-size:1.6rem;color:var(--color-text);margin-bottom:4px">智能网联汽车<span style="color:var(--color-accent)">新闻</span></div>`;
  html += `<div style="font-size:0.85rem;color:var(--color-text-secondary)">${data.window_display} · 共 ${data.total} 条资讯</div>`;
  // Category tags
  html += `<div style="margin-top:12px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap">`;
  for (const cat of CAT_ORDER) {
    const cnt = data.categories[cat];
    if (cnt) html += `<span style="padding:3px 14px;border-radius:100px;font-size:0.75rem;background:var(--color-accent-dim);color:var(--color-accent);font-weight:500">${CAT_ICONS[cat]||''} ${cat} ${cnt}</span>`;
  }
  html += `</div></div>`;

  // Articles by category
  for (const cat of CAT_ORDER) {
    const items = byCat[cat];
    if (!items || items.length === 0) continue;
    html += `<div style="margin-bottom:24px">`;
    html += `<h3 style="font-family:var(--font-sans);font-size:0.95rem;font-weight:600;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--color-accent);display:inline-block">${CAT_ICONS[cat]||''} ${cat}</h3>`;
    html += `<div style="display:flex;flex-direction:column;gap:8px">`;
    items.forEach(a => {
      html += `<div style="background:var(--bg-card);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:16px 20px;transition:var(--transition);cursor:pointer" onmouseover="this.style.boxShadow='0 4px 16px rgba(31,27,22,0.08)';this.style.borderColor='var(--color-accent)'" onmouseout="this.style.boxShadow='none';this.style.borderColor='var(--color-border)'">`;
      html += `<a href="${escHtml(a.url)}" target="_blank" rel="noopener noreferrer" style="font-family:var(--font-sans);font-size:0.9rem;font-weight:600;color:var(--color-text);text-decoration:none;display:block;margin-bottom:4px;line-height:1.4" onmouseover="this.style.color='var(--color-accent)'" onmouseout="this.style.color='var(--color-text)'">${escHtml(a.title)}</a>`;
      html += `<div style="font-size:0.78rem;color:var(--color-text-muted);margin-bottom:6px"><span>${escHtml(a.source)}${a.publish_date ? ' · ' + escHtml(a.publish_date) : ''}</span></div>`;
      if (a.summary) {
        html += `<div style="font-size:0.82rem;color:var(--color-text-secondary);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden">${escHtml(a.summary)}</div>`;
      } else {
        html += `<div style="font-size:0.78rem;color:var(--color-text-muted);font-style:italic">（暂无摘要）</div>`;
      }
      html += `</div>`;
    });
    html += `</div></div>`;
  }

  viewer.innerHTML = html;
}

function escHtml(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function escJs(s) { return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'\\"').replace(/\n/g,'\\n'); }

function onIframeLoad(iframe) {
  try {
    iframe.style.height = iframe.contentWindow.document.body.scrollHeight + 'px';
  } catch(e) {
    // Cross-origin or not ready yet
    iframe.style.height = '800px';
  }
}

// ============================================================
// 全局文章弹窗（跨 iframe 通信）
// ============================================================
function openArticleModal(title, source, date, content, url) {
  document.getElementById('articleModalTitle').textContent = title;
  document.getElementById('articleModalMeta').textContent = (source || '') + ' · ' + (date || '');
  document.getElementById('articleModalBody').textContent = content || '（暂无全文）';

  const linkEl = document.getElementById('articleModalLink');
  if (url) {
    linkEl.href = url;
    linkEl.style.display = 'inline-flex';
  } else {
    linkEl.style.display = 'none';
  }

  document.getElementById('articleModalOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeArticleModal(e) {
  if (e && e.target !== document.getElementById('articleModalOverlay')) return;
  document.getElementById('articleModalOverlay').classList.remove('active');
  document.body.style.overflow = '';
}

// 监听 iframe 内 postMessage 调用
window.addEventListener('message', function(e) {
  if (!e.data || !e.data.type) return;
  if (e.data.type === 'openArticleModal') {
    openArticleModal(e.data.title, e.data.source, e.data.date, e.data.content, e.data.url);
  }
});

// ESC 关闭弹窗
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeArticleModal();
});

// ============================================================
// Weekly — 从 DB 实时加载
// ============================================================
async function initWeekly() {
  // 计算本周一
  const today = new Date();
  const day = today.getDay();
  const diff = day === 0 ? -13 : -(6 + day); // 默认显示上周（已完成的一周）
  const monday = new Date(today); monday.setDate(today.getDate() + diff);
  const weekStart = monday.toISOString().slice(0, 10);

  const data = await api(`/api/weekly-data/${weekStart}`);
  if (!data || data.total === 0) {
    document.getElementById('weeklyViewer').innerHTML = `<div class="empty-state"><div class="icon">📋</div><div>本周暂无数据</div></div>`;
    document.getElementById('weeklyPastGrid').innerHTML = '<span style="font-size:0.85rem;color:var(--color-text-muted)">暂无往期周报</span>';
    return;
  }
  renderWeeklyViewer(data);
  renderWeeklyPast(data.past_weeks || []);
}

function renderWeeklyViewer(data) {
  const viewer = document.getElementById('weeklyViewer');
  const cats = data.categories || {};
  const catKeys = ['政策法规','标准动态','投融资动态','技术动态','项目动态','行业动态'].filter(c => cats[c]);
  catKeys.push(...Object.keys(cats).filter(c => !catKeys.includes(c)));

  // 抬头：日期范围 + 各分类数量
  const ws = data.week_start, we = data.week_end;
  const catTags = catKeys.map(c => `${c} ${cats[c]}条`).join('  ·  ');
  const heroEl = document.getElementById('weeklyHeroSub');
  if (heroEl) heroEl.innerHTML = `共 ${data.total} 条资讯${catKeys.length ? '  ·  ' + catTags : ''}`;
  // 也更新标题上的日期标记
  const titleEl = document.querySelector('#weeklyHero .hero-title span');
  if (titleEl && ws) titleEl.textContent = `${ws} ~ ${we}`;

  let html = '';
  // 概览
  html += `<div class="overview-block" style="background:var(--bg-card);border-radius:var(--radius-md);padding:20px 24px;border:1px solid var(--color-border);margin-bottom:20px">`;
  html += `<h3 style="font-size:1.05rem;margin-bottom:12px;color:#1e3a5f">📌 本周概览（${data.total}条资讯，${catKeys.length}个分类）</h3>`;
  html += `<ul style="padding-left:20px;margin:0">`;
  (data.top||[]).slice(0,5).forEach(a => {
    html += `<li style="margin-bottom:6px;font-size:0.9rem">${escHtml(a.title)}</li>`;
  });
  html += `</ul></div>`;

  // 按分类
  catKeys.forEach(cat => {
    const items = data.articles.filter(a => (a.category||'其他') === cat);
    if (!items.length) return;
    const icons = {政策法规:'📜',标准动态:'📏',投融资动态:'💰',技术动态:'🔧',项目动态:'🏗️',行业动态:'📊'};
    html += `<div style="margin-bottom:16px">`;
    html += `<h3 style="font-size:1rem;font-weight:700;color:#1e3a5f;border-left:4px solid #2563eb;padding-left:10px;margin:0 0 8px">${icons[cat]||'📌'} ${cat}（${items.length}条）</h3>`;
    items.slice(0,8).forEach(a => {
      const summary = a.summary || '';
      html += `<div style="background:var(--bg-card);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:14px 18px;margin-bottom:8px;transition:box-shadow .2s;cursor:default" onmouseover="this.style.boxShadow='0 4px 12px rgba(0,0,0,.08)';this.style.borderColor='#2563eb'" onmouseout="this.style.boxShadow='';this.style.borderColor='var(--color-border)'">`;
      html += `<a href="${escHtml(a.url)}" target="_blank" rel="noopener noreferrer" style="font-family:var(--font-sans);font-size:0.92rem;font-weight:600;color:var(--color-text);text-decoration:none;display:block;margin-bottom:3px" onmouseover="this.style.color='#2563eb'" onmouseout="this.style.color='var(--color-text)'">${escHtml(a.title)}</a>`;
      html += `<div style="font-size:0.76rem;color:var(--color-text-muted)">${escHtml(a.source)} · ${escHtml(a.publish_date||'')}</div>`;
      if (summary) html += `<div style="font-size:0.8rem;color:var(--color-text-secondary);margin-top:4px;line-height:1.5">${escHtml(summary)}</div>`;
      html += `</div>`;
    });
    html += `</div>`;
  });

  viewer.innerHTML = html;
}

function renderWeeklyPast(pastWeeks) {
  const grid = document.getElementById('weeklyPastGrid');
  if (!pastWeeks.length) {
    grid.innerHTML = '<span style="font-size:0.85rem;color:var(--color-text-muted)">暂无往期周报</span>';
    return;
  }
  grid.innerHTML = '';
  pastWeeks.forEach((w, i) => {
    // 周一日期 w → 计算周日日期用于显示 "7月6日 ~ 7月13日"
    const m = new Date(w + 'T00:00:00');
    if (isNaN(m.getTime())) return;
    const s = new Date(m); s.setDate(m.getDate() + 6);
    const fmt = d => `${d.getMonth()+1}月${d.getDate()}日`;
    const label = `${fmt(m)} ~ ${fmt(s)}`;

    const item = document.createElement('div');
    item.className = 'past-item';
    item.innerHTML = `<div class="past-item-icon">📄</div><span class="past-item-title">${label} 周报</span>`;
    item.onclick = async () => {
      document.querySelectorAll('#weeklyPastGrid .past-item').forEach(el => el.classList.remove('active'));
      item.classList.add('active');
      const data = await api(`/api/weekly-data/${w}`);
      if (data && data.total > 0) {
        renderWeeklyViewer(data);
        document.getElementById('weeklyHero').scrollIntoView({ behavior: 'smooth' });
      }
    };
    grid.appendChild(item);
  });
}

// ============================================================
// Monthly
// ============================================================
function initMonthly() {
  const grid = document.getElementById('monthlyPastGrid');
  if (monthlyReports.length === 0) {
    document.getElementById('monthlyViewer').innerHTML = `<div class="empty-state"><div class="icon">📅</div><div>月报功能即将上线</div></div>`;
    grid.innerHTML = '<span style="font-size:0.85rem;color:var(--color-text-muted)">暂无往期月报</span>';
    return;
  }

  monthlyReports.sort((a,b) => b.file.localeCompare(a.file));
  grid.innerHTML = '';
  monthlyReports.forEach((r, i) => {
    const label = r.file.replace('.html','');
    const item = document.createElement('div');
    item.className = 'past-item' + (i === 0 ? ' active' : '');
    item.innerHTML = `<div class="past-item-icon">📄</div><span class="past-item-title">月报 | 智能网联汽车新闻动态 (${label})</span>`;
    item.onclick = () => selectMonthly(i);
    grid.appendChild(item);
  });
  selectMonthly(0);
}

function selectMonthly(idx) {
  if (idx < 0 || idx >= monthlyReports.length) return;
  const report = monthlyReports[idx];
  document.querySelectorAll('#monthlyPastGrid .past-item').forEach((item, i) => {
    item.classList.toggle('active', i === idx);
  });
  const viewer = document.getElementById('monthlyViewer');
  const iframeId = 'monthly-frame-' + (++iframeIdCounter);
  viewer.innerHTML = `<iframe id="${iframeId}" src="${report.path}" onload="onIframeLoad(this)" style="min-height:400px"></iframe>`;
}

</script>
