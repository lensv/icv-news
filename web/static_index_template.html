<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>智能网联汽车新闻 · 报告入口</title>
<style>
:root{--bg-deep:#f8f6f2;--bg-surface:#fff;--bg-card:#fff;--bg-card-hover:#faf8f4;--color-accent:#c27803;--color-accent-dim:rgba(194,120,3,.08);--color-text:#1f1b16;--color-text-secondary:#6b6258;--color-text-muted:#a89f94;--color-border:#e8e2d9;--color-border-light:#ddd6cb;--radius-sm:8px;--radius-md:12px;--transition:.3s cubic-bezier(.4,0,.2,1)}
*{margin:0;padding:0;box-sizing:border-box}html{font-size:15px}body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",PingFang SC,Hiragino Sans GB,Microsoft YaHei,sans-serif;background:var(--bg-deep);color:var(--color-text);min-height:100vh}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--color-border-light);border-radius:3px}
.nav{position:sticky;top:0;z-index:100;background:rgba(248,246,242,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--color-border);padding:0 24px}
.nav-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;gap:32px;height:64px}
.nav-brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:1rem;color:var(--color-text);text-decoration:none;white-space:nowrap}
.nav-brand-icon{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,#c27803,#a06402);display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff}
.nav-links{display:flex;gap:4px;flex:1}
.nav-link{padding:8px 20px;border-radius:var(--radius-sm);font-size:.85rem;font-weight:500;color:var(--color-text-secondary);cursor:pointer;transition:var(--transition);border:none;background:transparent;letter-spacing:.3px;position:relative}
.nav-link:hover{color:var(--color-text);background:var(--color-accent-dim)}
.nav-link.active{color:var(--color-accent);background:var(--color-accent-dim)}
.nav-link.active::after{content:"";position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);width:60%;height:2px;background:var(--color-accent);border-radius:1px}
.container{max-width:1200px;margin:0 auto;padding:0 24px}
.tab-content{display:none;animation:fadeIn .35s ease}.tab-content.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.calendar-section{padding:28px 0 20px}
.calendar-nav{display:flex;align-items:center;justify-content:center;gap:20px;margin-bottom:16px}
.calendar-nav-btn{background:var(--bg-card);border:1px solid var(--color-border);border-radius:var(--radius-sm);padding:6px 14px;cursor:pointer;font-size:.85rem;color:var(--color-text-secondary);transition:var(--transition)}
.calendar-nav-btn:hover{background:var(--bg-card-hover);color:var(--color-text);border-color:var(--color-accent)}
.calendar-month{font-size:1.3rem;color:var(--color-text);min-width:140px;text-align:center;font-weight:600}
.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;background:var(--bg-card);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:10px}
.calendar-weekday{text-align:center;font-size:.72rem;color:var(--color-text-muted);padding:6px 0;font-weight:500}
.calendar-day{text-align:center;padding:6px 0;border-radius:var(--radius-sm);font-size:.85rem;color:var(--color-text-secondary);cursor:pointer;transition:var(--transition);position:relative;min-height:32px;display:flex;align-items:center;justify-content:center}
.calendar-day:hover{background:var(--color-accent-dim);color:var(--color-accent)}
.calendar-day.has-report{color:var(--color-text);font-weight:600}
.calendar-day.has-report::after{content:"";position:absolute;bottom:3px;width:4px;height:4px;border-radius:50%;background:var(--color-accent)}
.calendar-day.selected{background:var(--color-accent);color:#fff;font-weight:700}
.calendar-day.selected::after{background:#fff}
.calendar-day.empty{cursor:default;visibility:hidden}
.hero-section{padding:28px 0 16px;text-align:center}
.hero-title{font-size:clamp(1.5rem,3vw,2.2rem);color:var(--color-text);margin-bottom:4px}
.hero-title span{color:var(--color-accent)}
.hero-subtitle{font-size:.85rem;color:var(--color-text-secondary);font-weight:300}
.cat-tag{display:inline-block;background:var(--color-accent-dim);color:var(--color-accent);padding:2px 10px;border-radius:10px;font-size:.78rem;font-weight:600;margin:2px 4px}
.article-card{background:var(--bg-card);border:1px solid var(--color-border);border-radius:var(--radius-md);padding:16px 20px;margin:12px 0;transition:var(--transition)}
.article-card:hover{box-shadow:0 4px 16px rgba(194,120,3,.12);border-color:var(--color-accent);transform:translateY(-1px)}
.article-title{font-weight:600;font-size:.9rem;color:var(--color-text);text-decoration:none;display:block;margin-bottom:4px;line-height:1.4}
.article-title:hover{color:var(--color-accent)}
.article-meta{font-size:.78rem;color:var(--color-text-muted);display:flex;justify-content:flex-start;align-items:center;gap:12px;margin-bottom:8px}
.article-summary{font-size:.82rem;color:var(--color-text-secondary);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.cat-section{margin:24px 0 12px;padding-bottom:6px;border-bottom:2px solid var(--color-accent);display:flex;align-items:center;gap:10px}
.cat-section h2{font-size:1.1rem;color:var(--color-accent);font-weight:600}
.cat-count{font-size:.78rem;color:var(--color-text-muted);background:var(--color-accent-dim);padding:2px 10px;border-radius:10px}
.empty-state{padding:60px 20px;text-align:center;color:var(--color-text-muted);background:var(--bg-card);border:1px solid var(--color-border);border-radius:var(--radius-md);margin-top:20px}
.weekly-content{padding-bottom:32px}
.weekly-viewer,.monthly-viewer{min-height:300px}
.past-section{margin-top:16px;padding-top:16px;border-top:1px solid var(--color-border)}
.past-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.past-header h3{font-size:.95rem;font-weight:600;color:var(--color-text);letter-spacing:.3px}
.past-line{flex:1;height:1px;background:linear-gradient(90deg,var(--color-border-light),transparent)}
.past-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:8px}
.past-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--radius-sm);border-left:3px solid transparent;cursor:pointer;transition:var(--transition);font-size:.85rem;color:var(--color-text-secondary);background:var(--bg-card);border:1px solid var(--color-border);text-decoration:none}
.past-item:hover{background:var(--bg-card-hover);color:var(--color-text);border-left-color:var(--color-accent)}
.past-item-icon{width:18px;height:18px;border:1.5px solid var(--color-border-light);border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--color-text-muted);flex-shrink:0}
.past-item-date{font-size:.75rem;color:var(--color-text-muted);flex-shrink:0;margin-left:auto}
.loading{padding:40px;text-align:center;color:var(--color-text-muted);font-size:.9rem}
@media(max-width:768px){.nav-links{gap:0}.nav-link{padding:8px 12px;font-size:.78rem}.calendar-grid{padding:6px;gap:2px}.calendar-day{font-size:.78rem;min-height:28px}.calendar-month{font-size:1.1rem}.article-card{padding:12px 14px}}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a class="nav-brand" href="./"><div class="nav-brand-icon">⚡</div>智能网联汽车新闻</a>
    <div class="nav-links">
      <button class="nav-link active" data-tab="daily" onclick="switchTab('daily')">📰 日报</button>
      <button class="nav-link" data-tab="weekly" onclick="switchTab('weekly')">📋 周报</button>
    </div>
  </div>
</nav>

<div class="container">

<div class="tab-content active" id="tab-daily">
  <div class="calendar-section">
    <div class="calendar-nav">
      <button class="calendar-nav-btn" onclick="calMonth(-1)">←</button>
      <span class="calendar-month" id="calMonthLabel"></span>
      <button class="calendar-nav-btn" onclick="calMonth(1)">→</button>
    </div>
    <div class="calendar-grid" id="calGrid"></div>
  </div>
  <div class="report-viewer" id="dailyViewer">
    <div class="empty-state"><div style="font-size:32px">📰</div><div>选择一个日期查看日报</div></div>
  </div>
</div>

<div class="tab-content" id="tab-weekly">
  <div class="hero-section">
    <div class="hero-title"><span id="weeklyHeroTitle">周报</span> 总览</div>
    <div class="hero-subtitle" id="weeklyHeroSub">智能网联汽车每周新闻综述</div>
  </div>
  <div class="weekly-content">
    <div class="weekly-viewer" id="weeklyViewer"></div>
    <div class="past-section">
      <div class="past-header"><h3>📋 往期回顾</h3><div class="past-line"></div></div>
      <div class="past-grid" id="weeklyPastGrid"></div>
    </div>
  </div>
</div>

</div>

<script>
/* === 静态数据注入（CI 时由 build_static_page.py 写入） === */
const DATA = __INJECTED_DATA__;

/* === Tab 切换 === */
function switchTab(tab) {
  document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-'+tab).classList.add('active');
  document.querySelector('.nav-link[data-tab="'+tab+'"]').classList.add('active');
  if (tab === 'daily') renderCalendar();
  if (tab === 'weekly') renderWeekly();
}

/* === 日历 === */
const WD = ['日','一','二','三','四','五','六'];
let calDate = new Date();
let selectedDate = null;

function calMonth(d) { calDate.setMonth(calDate.getMonth()+d); renderCalendar(); }

function renderCalendar() {
  const y = calDate.getFullYear(), m = calDate.getMonth();
  document.getElementById('calMonthLabel').textContent = y+'年'+(m+1)+'月';
  const fd = new Date(y,m,1).getDay();
  const dim = new Date(y,m+1,0).getDate();
  let html = '';
  WD.forEach(w => html += '<div class="calendar-weekday">'+w+'</div>');
  for (let i=0;i<fd;i++) html += '<div class="calendar-day empty"></div>';
  for (let d=1;d<=dim;d++) {
    const s = y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const has = DATA.daily[s];
    let cls = 'calendar-day';
    if (has) cls += ' has-report';
    if (s === selectedDate) cls += ' selected';
    let oc = '';
    if (has) oc = ' onclick="selectDate(\''+s+'\')"';
    html += '<div class="'+cls+'"'+oc+'>'+d+'</div>';
  }
  document.getElementById('calGrid').innerHTML = html;
}

function selectDate(s) {
  selectedDate = s;
  renderCalendar();
  renderDaily(s);
}

function renderDaily(s) {
  const viewer = document.getElementById('dailyViewer');
  const data = DATA.daily[s];
  if (!data) {
    viewer.innerHTML = '<div class="empty-state"><div style="font-size:32px">📭</div><div>'+s+' 暂无日报</div></div>';
    return;
  }
  const weekdays = ['','周一','周二','周三','周四','周五','周六','周日'];
  const dt = new Date(s);
  const wd = weekdays[dt.getDay() || 7];
  let html = '<div class="hero-section" style="padding:24px 0 12px"><div class="hero-title" style="font-size:1.5rem">智能网联汽车 <span style="color:var(--color-accent)">日报</span></div><div class="hero-subtitle">'+s+' '+wd+' · 共 '+data.total+' 条资讯 · '+formatCats(data.categories)+'</div></div>';
  const catOrder = ['政策法规','标准动态','投融资动态','技术动态','项目动态','行业动态'];
  const cats = data.categories;
  for (const cat of catOrder) {
    if (!cats[cat]) continue;
    const items = data.articles.filter(a => a.category === cat);
    html += '<div class="cat-section"><h2>📌 '+cat+'</h2><span class="cat-count">'+items.length+' 条</span></div>';
    for (const a of items) {
      const summary = a.summary || '（暂无摘要）';
      html += '<div class="article-card">';
      html += '<a class="article-title" href="'+escAttr(a.url)+'" target="_blank" rel="noopener noreferrer">'+escHtml(a.title)+'</a>';
      html += '<div class="article-meta"><span>📰 '+escHtml(a.source || '')+'</span><span>📅 '+escHtml(a.publish_date || s)+'</span></div>';
      html += '<div class="article-summary">'+escHtml(summary)+'</div>';
      html += '</div>';
    }
  }
  // 未在6类中的兜底
  const known = new Set(catOrder);
  const others = data.articles.filter(a => !known.has(a.category));
  for (const a of others) {
    html += '<div class="cat-section"><h2>📌 '+(a.category || '未分类')+'</h2></div>';
    html += '<div class="article-card"><a class="article-title" href="'+escAttr(a.url)+'" target="_blank" rel="noopener noreferrer">'+escHtml(a.title)+'</a>';
    html += '<div class="article-meta"><span>📰 '+escHtml(a.source || '')+'</span><span>📅 '+escHtml(a.publish_date || s)+'</span></div>';
    html += '<div class="article-summary">'+escHtml(a.summary || '（暂无摘要）')+'</div></div>';
  }
  viewer.innerHTML = html;
}

function formatCats(cats) {
  return Object.entries(cats).map(([k,v]) => k+' '+v+'条').join(' · ');
}

/* === 周报 === */
function renderWeekly() {
  // 默认显示上周
  const today = new Date();
  const day = today.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  const monday = new Date(today); monday.setDate(today.getDate() + diff);
  const lastMonday = new Date(monday); lastMonday.setDate(monday.getDate() - 7);
  const lastSunday = new Date(lastMonday); lastSunday.setDate(lastMonday.getDate() + 6);
  const startStr = lastMonday.toISOString().slice(0,10);
  const endStr = lastSunday.toISOString().slice(0,10);
  const defaultWeek = DATA.weekly[startStr];
  if (defaultWeek) {
    renderWeeklyViewer(defaultWeek);
  } else {
    document.getElementById('weeklyViewer').innerHTML = '<div class="empty-state"><div style="font-size:32px">📋</div><div>本周暂无周报</div></div>';
  }
  // 往期回顾
  const grid = document.getElementById('weeklyPastGrid');
  const weeks = Object.keys(DATA.weekly).sort().reverse();
  if (weeks.length === 0) {
    grid.innerHTML = '<span style="font-size:.85rem;color:var(--color-text-muted)">暂无往期周报</span>';
    return;
  }
  grid.innerHTML = '';
  weeks.forEach(w => {
    const endDate = new Date(w); endDate.setDate(endDate.getDate() + 6);
    const label = w.slice(5).replace('-','月')+'日 ~ '+endDate.toISOString().slice(5).replace('-','月')+'日';
    const item = document.createElement('div');
    item.className = 'past-item';
    item.innerHTML = '<span class="past-item-icon">📋</span><span>'+label+'</span><span class="past-item-date">'+w+'</span>';
    item.onclick = () => {
      document.querySelectorAll('#weeklyPastGrid .past-item').forEach(el => el.classList.remove('active'));
      item.classList.add('active');
      renderWeeklyViewer(DATA.weekly[w]);
      window.scrollTo({top:0,behavior:'smooth'});
    };
    grid.appendChild(item);
  });
}

function renderWeeklyViewer(data) {
  document.getElementById('weeklyHeroTitle').textContent = data.week_start+' ~ '+data.week_end;
  const ws = data.week_start, we = data.week_end;
  const catKeys = Object.keys(data.categories);
  const catTags = catKeys.map(c => c+' '+data.categories[c]+'条').join('  ·  ');
  document.getElementById('weeklyHeroSub').innerHTML = '共 '+data.total+' 条资讯'+(catKeys.length ? '  ·  '+catTags : '');
  const viewer = document.getElementById('weeklyViewer');
  const catOrder = ['政策法规','标准动态','投融资动态','技术动态','项目动态','行业动态'];
  let html = '';
  for (const cat of catOrder) {
    const items = data.articles.filter(a => a.category === cat);
    if (items.length === 0) continue;
    html += '<div class="cat-section"><h2>📌 '+cat+'</h2><span class="cat-count">'+items.length+' 条</span></div>';
    for (const a of items) {
      const summary = a.summary || '（暂无摘要）';
      html += '<div class="article-card">';
      html += '<a class="article-title" href="'+escAttr(a.url)+'" target="_blank" rel="noopener noreferrer">'+escHtml(a.title)+'</a>';
      html += '<div class="article-meta"><span>📰 '+escHtml(a.source || '')+'</span><span>📅 '+escHtml(a.publish_date || '')+'</span></div>';
      html += '<div class="article-summary">'+escHtml(summary)+'</div>';
      html += '</div>';
    }
  }
  viewer.innerHTML = html;
}

/* === 工具 === */
function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) { return escHtml(s).replace(/'/g,'&#39;'); }

/* === 初始化 === */
document.addEventListener('DOMContentLoaded', () => {
  // 默认选中最新一天
  const dates = Object.keys(DATA.daily).sort().reverse();
  if (dates.length > 0) {
    const firstDate = dates[0];
    calDate = new Date(parseInt(firstDate.slice(0,4)), parseInt(firstDate.slice(5,7))-1, 1);
    selectedDate = firstDate;
  }
  renderCalendar();
  if (selectedDate) renderDaily(selectedDate);
});
</script>
</body>
</html>
